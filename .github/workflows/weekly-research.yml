name: Weekly research refresh

# Every Monday: re-run the weather study and the walk-forward evaluation on
# the newest data and commit the refreshed artifacts. The estimates sharpen
# mechanically as event counts and price history grow — no parameters are
# ever retuned by this job (see docs/ROADMAP-to-Nov-1.md, "What NOT to do").

on:
  schedule:
    - cron: "0 22 * * 1"   # Mondays 22:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-research
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch fresh data
        run: |
          python -m ascentagri.vendor_fetch
          python -m ascentagri.macro_fetch --force

      - name: Re-run the weather study
        run: python -m ascentagri.research.weather_study

      - name: Re-run the walk-forward evaluation
        run: |
          python - <<'PY'
          import json, logging, warnings
          logging.basicConfig(level=logging.ERROR)
          warnings.filterwarnings("ignore")
          import pandas as pd
          from ascentagri.config import get_config
          from ascentagri.research.walk_forward_runner import run_walk_forward
          close_df = pd.read_csv("data/processed/coffee_KCF_yahoo.csv",
                                 parse_dates=["date"]).set_index("date").sort_index()
          from ascentagri.macro_fetch import load_brlusd, load_weather
          res = run_walk_forward(close_df["close"], open_prices=close_df.get("open"),
                                 brl_usd=load_brlusd(), weather=load_weather(),
                                 config=get_config(), verbose=False)
          out = dict(res.report)
          out["fold_summaries"] = res.fold_summaries
          with open("outputs/research/wf_weekly.json", "w") as f:
              json.dump(out, f, indent=2, default=str)
          print("WF weekly:", {k: out[k] for k in
                ("cagr", "arithmetic_sharpe", "wfe", "n_folds", "n_failed_folds")})
          PY

      - name: Snapshot usage evidence (GitHub traffic + stars)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import json, os, urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          def api(path):
              req = urllib.request.Request(
                  f"https://api.github.com/repos/ScottDongKhang/ascent-agri{path}",
                  headers={"Authorization": f"token {os.environ['GH_TOKEN']}",
                           "Accept": "application/vnd.github+json"})
              return json.loads(urllib.request.urlopen(req, timeout=30).read())

          views = api("/traffic/views")
          clones = api("/traffic/clones")
          repo = api("")
          entry = {
              "date": datetime.now(timezone.utc).strftime("%Y-%m-%d"),
              "views_14d": views.get("count", 0),
              "unique_visitors_14d": views.get("uniques", 0),
              "clones_14d": clones.get("count", 0),
              "unique_cloners_14d": clones.get("uniques", 0),
              "stars": repo.get("stargazers_count", 0),
              "watchers": repo.get("subscribers_count", 0),
              "forks": repo.get("forks_count", 0),
          }
          p = Path("data/ledger/traffic.jsonl")
          p.parent.mkdir(parents=True, exist_ok=True)
          existing = [json.loads(l) for l in p.read_text().splitlines()] if p.exists() else []
          if any(e["date"] == entry["date"] for e in existing):
              print("traffic snapshot for today already recorded")
          else:
              with open(p, "a") as f:
                  f.write(json.dumps(entry, sort_keys=True) + "\n")
              print("traffic snapshot:", entry)
          PY

      - name: Commit refreshed artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/research/weather_study.json outputs/research/wf_weekly.json \
                  data/ledger/traffic.jsonl
          if ! git diff --cached --quiet; then
            git commit -m "research: weekly refresh $(date -u +%F)"
            git pull --rebase origin main
            git push origin HEAD:main
          else
            echo "No changes in research artifacts."
          fi
